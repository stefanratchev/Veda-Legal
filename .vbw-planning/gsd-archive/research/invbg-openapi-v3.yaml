    -
        name: webhooks
        description: "Webhooks, used to receive events from inv.bg. Inv.bg sends a `HTTP post` request to the given url when the registered event for that webhook occurs. The body of the request contains a json object with two fields: `event` and `payload` that contains `id` of the entity to which the event relates and the name of the event in the `event` field. Additional we add request header `X-Inv-Signature` with value hash of the request body. To validate that the event is from Inv.bg, you must generate a `sha256` hash of the request body + secret for that webhook and compare it with the value in the `X-Inv-Signature` header. Inv.bg will wait for up to 10 seconds for a response with status code 200. If the response is not received within 10 seconds, the request will be repeated. With each retry the interval is increased between requests. Inv.bg will stop attempting deliveries after about 24 hours of no success for particular event. Example body: ``` {\n    \"event\": \"invoice.created\",\n    \"payload\": {\n        \"id\": \"123456789\"\n    }\n} ```"
        x-displayName: 'Webhook events'
    -
        name: links
        x-displayName: Links
        description: 'Working with links. Generating links for sharing documents.'
