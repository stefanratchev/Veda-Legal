                    type: string
                    description: 'Accountable person'
                    example: 'Иван Шишманов'
                email:
                    type: string
                    description: 'Contact email'
                    example: support@stronghamals.bg
                is_custom_properties_visible:
                    type: boolean
                    description: 'Whether to show custom properties on invoices'
                custom_properties:
                    type: array
                    description: "Additional company data.\nAn array of key/value pairs describing additional data about the company. \n- If `custom_properties` is omitted as a parameter, the current data remains unchanged.\n- If `custom_properties` is provided as a parameter and its value is an empty array (i.e. [] or null), then all additional data for the company will be deleted.\n- If `custom_properties` is an array containing at least one object, its value replaces the current additional data for the company, following these rules:\n    - Objects with a provided \"id\" are updated (replaced).\n    - Objects without a provided \"id\" are added as new entries (created).\n    - Existing objects (before the request) not matching the above two cases are deleted (deleted).\n\nThis algorithm allows you to submit the desired state of the objects in `custom_properties` and \nachieve this final state simply by passing everything needed in `custom_properties`, \nwithout having to explicitly delete entries.\n"
                    items:
                        type: object
                        properties:
                            id:
                                type: integer
                                description: 'Existing property ID to update'
                            key:
                                type: string
                                description: 'Key of the property (e.g. "license_number")'
                            value:
                                type: string
                                description: 'Value of the property'
                            key_foreign:
                                type: string
                                description: 'Key of the property, for invoices in foreign language'
                            value_foreign:
                                type: string
                                description: 'Value of the property, for invoices in foreign language'
                        required:
                            - key
                            - value
                    example:
                        -
                            id: 101
                            key: лицензионен-номер
                            value: '12049092'
                            key_foreign: license-number
                            value_foreign: 12049092EN
