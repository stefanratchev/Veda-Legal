servers:
    -
        url: /v3
components:
    parameters:
        orderParam:
            name: order_by
            in: query
            description: 'By what field to sort the result'
            schema:
                type: string
            required: false
        sortParam:
            name: order
            in: query
            description: 'How to sort the result. `asc` - ascending, `desc` - descending'
            schema:
                type: string
                default: desc
                enum:
                    - asc
                    - desc
            required: false
        PerPageParam:
            name: per_page
            in: query
            description: 'How many elements to have on each page of the response'
            schema:
                type: integer
                minimum: 1
                default: 50
            required: false
        PageParam:
            name: page
            in: query
            description: 'Which page to use'
            schema:
                type: integer
                minimum: 1
                default: 1
            required: false
        SearchParam:
            name: search
            in: query
            description: 'This argument can be used to search through the results'
            schema:
                type: string
            required: false
        LanguageParam:
            name: Accept-Language
            in: header
            description: 'In what language to return the data'
            required: false
            schema:
                type: string
                enum:
                    - bg
                    - en
        FromDateParam:
            name: from_date
            in: query
            description: 'Export start date. The default is 24 hours ago. Format: Y-m-d'
            schema:
                type: string
        ToDateParam:
            name: to_date
            in: query
            description: 'Export end date. Format: Y-m-d'
            schema:
                type: string
        BankIDFilter:
            name: bank_account_id
            in: query
            required: false
            description: 'Select only those whose bank account is from the selected unique bank account IDs'
            explode: true
            schema:
                type: array
                items:
                    type: number
                    format: integer
        LinkedFilter:
            name: linked
            in: query
            required: false
            description: 'Filter only related or only unrelated records. Possible values are 0 (unconnected) and 1 (connected)'
            schema:
                type: number
                format: integer
                enum:
                    - 0
                    - 1
        LinkedToFilter:
            name: linked_to
            in: query
            required: false
            description: 'Filter by type of documents related to transactions. Possible values are dan (invoice), prof (proforma), deb (debit note) and cred (credit note)'
            schema:
                type: array
                items:
                    type: string
                    enum:
                        - dan
                        - prof
                        - deb
                        - cred
        NotLinkedToFilter:
            name: not_linked_to
            in: query
            required: false
            description: 'Filter by type of documents not related to transactions. Possible values are dan (invoice), prof (proforma), deb (debit note) and cred (credit note)'
            schema:
                type: array
                items:
                    type: string
                    enum:
                        - dan
                        - prof
                        - deb
                        - cred
        BankTransactionTypeFilter:
            name: type
            in: query
            required: false
            description: 'Filter by transaction type only. Possible values are deb (debit) and cred (credit)'
            schema:
                type: string
                enum:
                    - deb
                    - cred
        AmountGreaterFilter:
            name: amount_gt
            in: query
            required: false
            description: 'Filter only records that are greater than or equal to the specified value'
            schema:
                type: number
                format: float
        AmountLowerFilter:
            name: amount_lt
            in: query
            required: false
            description: 'Filter only records that are less than or equal to the specified value'
            schema:
                type: number
                format: float
        BalancePaidGraterFilter:
            name: amount_paid_gt
            in: query
            required: false
            description: 'Filter only records that have a paid value greater than or equal to the specified one'
            schema:
                type: number
                format: float
        BalancePaidLowerFilter:
            name: amount_paid_lt
            in: query
            required: false
            description: 'Filter only records that have a paid value less than or equal to the specified one'
            schema:
                type: number
                format: float
        BalanceDueGraterFilter:
            name: amount_due_gt
            in: query
            required: false
            description: 'Filter only records that have an obligation value greater than or equal to the specified one'
            schema:
                type: number
                format: float
        BalanceDueLowerFilter:
            name: amount_due_lt
            in: query
            required: false
            description: 'Filter only records that have an obligation value less than or equal to the specified one'
            schema:
                type: number
                format: float
        PaidFromFilter:
            name: paid_from
            in: query
            required: false
            description: 'Filter only those with a date (ISO 8601) equal to or later than the specified one'
            schema:
                type: string
        PaidToFilter:
            name: paid_to
            description: 'Filter only those with a date (ISO 8601) equal to or earlier than the specified one'
            in: query
            required: false
            schema:
                type: string
        PaymentProcessorFilter:
            name: 'payment_processor[]'
            in: query
            required: false
            description: 'Filter by payment type'
            explode: true
            schema:
                type: array
                items:
                    type: string
                    enum:
                        - bank
                        - cash
                        - epay
                        - paypal
                        - stripe
                        - revolut
        DateFromFilter:
            name: date_from
            in: query
            required: false
            description: 'Filter only those with a date equal to or later than the specified one'
            schema:
                type: string
                format: 'date (ISO 8601)'
        DateToFilter:
            name: date_to
            description: 'Filter only those with a date equal to or earlier than the specified one'
            in: query
            required: false
            schema:
                type: string
                format: 'date (ISO 8601)'
        DateFromFilterReports:
            name: date_from
            in: query
            required: false
            description: 'Start date for the period. Default is one month ago'
            schema:
                type: string
                format: 'date (ISO 8601)'
        DateToFilterReports:
            name: date_to
            in: query
            required: false
            description: 'End date for the period. Default is today'
            schema:
                type: string
                format: 'date (ISO 8601)'
        ImportIdFilter:
            name: import_id
            in: query
            required: false
            description: 'Id of the import to be used for filtering.'
            schema:
                type: integer
        ImportDateFilter:
            name: import_date
            in: query
            required: false
            description: 'Date of the import to be used for filtering.'
            schema:
                type: string
                format: 'date (ISO 8601)'
        InvoiceTypeFilter:
            name: 'type[]'
            in: query
            required: false
            description: 'Filter by document type. Possible values are deb, cred, prof, dan, custom'
            explode: true
            schema:
                type: array
                items:
                    type: string
                    enum:
                        - deb
                        - cred
                        - prof
                        - dan
                        - protocol
                        - custom
        InvoiceTypeFilterSingle:
            name: type
            in: query
            required: false
            description: 'Filter by document type. Possible values are `deb`, `cred`, `prof`, `dan`, `custom`'
            schema:
                type: string
                items:
                    type: string
                    enum:
                        - deb
                        - cred
                        - prof
                        - dan
                        - custom
        ClientNameFilter:
            name: to_name
            in: query
            required: false
            description: "\nFilter by customer name. It is possible to use the following characters: \"%\" - replaces zero, one or more characters; \"_\" - replaces one character in the string with any value."
            schema:
                type: string
        ClientNameAliasFilter:
            name: use_alias
            in: query
            required: false
            description: 'Use advanced search by customer alias.'
            schema:
                type: string
        CorrespondentEmailFilter:
            name: correspondent_email
            in: query
            required: false
            description: 'Filter by correspondent''s email'
            schema:
                type: array
                items:
                    type: string
        InvoiceNumberFilter:
            name: number
            in: query
            required: false
            description: 'Filter by invoice number'
            schema:
                type: string
        InvoiceHistoryTypeFilter:
            name: type
            in: query
            required: false
            description: 'Filter by history type'
            schema:
                type: array
                items:
                    type: string
                    enum:
                        - paid
                        - rejected
                        - accepted
        ClientIdFilter:
            name: client_id
            in: query
            required: false
            description: 'Filter by client ID'
            schema:
                type: integer
        ContragentIDFilter:
            name: contragent_id
            in: query
            required: false
            description: 'Filter by contragent ID'
            schema:
                type: integer
        ContragentNameFilter:
            name: contragent
            in: query
            required: false
            description: 'Filter by counterparty name. It is possible to use the following symbols: "%" - replaces zero, one or more symbols; "_" - replaces one character in the string with any value.'
            schema:
                type: string
        ExpenseFilter:
            name: expense
            in: query
            required: false
            description: 'Only looks for expense/income type payments. Possible values ​​- `1,0`'
            schema:
                type: integer
        InvoicePaymentStatusFilter:
            name: status
            in: query
            required: false
            description: 'Filter by status. Possible values are paid, unpaid, partially-paid'
            explode: true
            schema:
                type: array
                items:
                    type: string
                    enum:
                        - paid
                        - unpaid
                        - partially-paid
        InvoiceDraftFilter:
            name: is_draft
            in: query
            required: false
            description: 'Filter by draft status. Possible values are 0 (is not draft ) and 1 (is draft)'
            schema:
                type: number
                format: integer
                enum:
                    - 0
                    - 1
        InvoiceAnnulledFilter:
            name: is_annulled
            in: query
            required: false
            description: 'Filter by annulled status. Possible values are 0 (is not annulled) and 1 (is annulled)'
            schema:
                type: number
                format: integer
                enum:
                    - 0
                    - 1
        InvoiceSentStatusFilter:
            name: send_status
            in: query
            required: false
            description: 'Filter by sent status. Possible values are unsent, resent, sent'
            explode: true
            schema:
                type: array
                items:
                    type: string
                    enum:
                        - unsent
                        - resent
                        - sent
        InvoiceCurrencyFilter:
            name: 'currency[]'
            in: query
            required: false
            description: 'Filter by invoice currency. ISO 4217 format.'
            explode: true
            schema:
                type: array
                items:
                    type: string
        InvoiceNoteFilter:
            name: note
            in: query
            required: false
            description: 'Filter by note, you can use `%` as a substitute for zero, one or more characters'
            schema:
                type: string
        InvoiceSignedFilter:
            name: signed
            in: query
            required: false
            description: 'Filter by signed status. Possible values are 0 (unsigned) and 1 (signed)'
            schema:
                type: number
                format: integer
                enum:
                    - 0
                    - 1
        InvoiceArchivedFilter:
            name: archived
            in: query
            required: false
            description: 'Filter by archived status. Possible values are 0 (not archived) and 1 (archived), default 0.'
            schema:
                type: number
                format: integer
                enum:
                    - 0
                    - 1
        MovementsStoreFilter:
            name: store_id
            in: query
            required: false
            description: 'Filter by unique store ID'
            schema:
                type: array
                items:
                    type: number
                    format: integer
        MovementsNumberFilter:
            name: number
            in: query
            required: false
            description: 'Filter by movement number'
            schema:
                type: array
                items:
                    type: number
                    format: integer
        MovementsStatusFilter:
            name: status
            in: query
            required: false
            description: 'Filter by movement status'
            schema:
                type: array
                items:
                    type: string
                    enum:
                        - draft
                        - annul
                        - confirmed
                        - for_confirmation
                        - canceled
        MovementsTypeFilter:
            name: type
            in: query
            required: false
            description: 'Filter by store movement type'
            schema:
                type: array
                items:
                    type: string
                    enum:
                        - in
                        - out
                        - move
                        - inspection
                        - scrap
        ExpandFilter:
            name: expand
            in: query
            required: false
            description: 'Allows expanding the result with additional data.'
            schema:
                type: array
                items:
                    type: string
                    enum:
                        - comments
        CommentTypeFilter:
            name: type
            in: query
            required: false
            description: 'Filter by comment type'
            schema:
                type: string
                enum:
                    - invoice
                    - store-movement
        CommentTypeEntityIdFilter:
            name: entity_id
            in: query
            required: false
            description: 'Filter by entity ID'
            schema:
                type: integer
                example: 42
        ProtocolTypeFilter:
            name: type
            in: query
            required: false
            description: 'Filter by protocol type. Possible values are "give", "get". If no filter is passed, all types are returned.'
            schema:
                type: string
                enum:
                    - give
                    - get
        ProtocolNumberFilter:
            name: number
            in: query
            required: false
            description: 'Filter by protocol number'
            schema:
                type: string
        ProtocolStatusFilter:
            name: status
            in: query
            required: false
            description: 'Filter by status. Possible values are "active", "deleted". If no filter is passed, only active are returned'
            explode: true
            schema:
                type: array
                items:
                    type: string
                    enum:
                        - active
                        - deleted
        ProtocolToIdentifierFilter:
            name: to_identifier
            in: query
            required: false
            description: 'Filter by EIK/Bulstat or EGN of the recipient of the protocol.'
            schema:
                type: string
        ProtocolToVATFilter:
            name: to_vat_number
            in: query
            required: false
            description: 'Filter by VAT number of the recipient of the protocol.'
            schema:
                type: string
        ProtocolToMolFilter:
            name: to_mol
            in: query
            required: false
            description: 'Filter by materially responsible person of the protocol recipient.'
            schema:
                type: string
        ProtocolToTownFilter:
            name: to_town
            in: query
            required: false
            description: 'Filter by town where the recipient is registered.'
            schema:
                type: string
        ProtocolToAddressFilter:
            name: to_address
            in: query
            required: false
            description: 'Filter by recipient address.'
            schema:
                type: string
        ProtocolItemNameFilter:
            name: item_name
            in: query
            required: false
            description: 'Filter by protocol item name, you can use % as a substitute for zero, one or more characters.'
            schema:
                type: string
        ProtocolXLSFilter:
            name: export_as_xls
            in: query
            required: false
            description: 'Whether the result is to be exported in xls format. Default is false.'
            schema:
                type: boolean
                default: false
    responses:
        Unauthorized:
            description: 'Unauthorized access'
            content:
                application/json:
                    schema:
                        type: object
                        properties:
                            status:
                                type: string
                                description: 'Short code description'
                                example: error
                            message:
                                type: string
                                description: 'Long code description'
                                example: 'Подробно описание на грешката'
        Forbidden:
            description: 'The account cannot access this API endpoint'
            content:
                application/json:
                    schema:
                        $ref: '#/components/schemas/JsonErrorResponse'
        InternalError:
            description: 'Server error'
            content:
                application/json:
                    schema:
                        $ref: '#/components/schemas/JsonErrorResponse'
        Conflict:
            description: 'Conflict while processing the request'
            content:
                application/json:
                    schema:
                        $ref: '#/components/schemas/JsonErrorResponse'
        Created:
            description: 'The resource is successfully created'
            content:
                application/json:
                    schema:
                        type: object
                        properties:
                            id:
                                type: number
                                description: 'Unique ID number of the resource'
                                example: 53
        Deleted:
            description: 'Successfully deleted'
        NotFound:
            description: 'The resource is not found'
            content:
                application/json:
                    schema:
                        $ref: '#/components/schemas/JsonErrorResponse'
        UserRequestError:
            description: 'Bad user request'
            content:
                application/json:
                    schema:
                        $ref: '#/components/schemas/JsonErrorResponse'
        FailedProxy:
            description: 'Proxy error'
            content:
                application/json:
                    schema:
                        $ref: '#/components/schemas/JsonErrorResponse'
        CashBoxXLSReport:
            description: 'Excel (.xls) file'
            content:
                application/json:
                    schema:
                        type: string
                        format: binary
        InvoicePDFFile:
            description: 'PDF file for the document'
            content:
                application/json:
                    schema:
                        type: string
                        format: binary
    requestBodies:
        BankAccountInput:
            content:
                application/json:
                    schema:
                        $ref: '#/components/schemas/BankAccountInput'
            required: true
        InvoiceNumberSetInput:
            content:
                application/json:
                    schema:
                        $ref: '#/components/schemas/InvoiceNumberSetInput'
            required: true
        StoreMovementInput:
            content:
                application/json:
                    schema:
                        $ref: '#/components/schemas/StoreMovementInput'
            required: true
        PaymentTransferInput:
            content:
                application/json:
                    schema:
                        $ref: '#/components/schemas/PaymentTransferInput'
            required: true
    securitySchemes:
        bearer:
            type: apiKey
            name: Authorization
            in: header
    schemas:
        DirectoriesListResponse:
            allOf:
                -
                    $ref: '#/components/schemas/ListResponse'
                -
                    type: object
                    properties:
                        directories:
                            type: array
                            items:
                                $ref: '#/components/schemas/DirectoryFlat'
        FilesListResponse:
            allOf:
                -
                    $ref: '#/components/schemas/ListResponse'
                -
                    type: object
                    properties:
                        files:
                            type: array
                            items:
                                $ref: '#/components/schemas/File'
        FilesEmailInput:
            required:
                - file_ids
                - email
            type: object
            properties:
                file_ids:
                    type: array
                    description: 'List of unique file IDs to be attached to the email'
                    items:
                        type: integer
                    example:
                        - 1234
                        - 5678
                email:
                    type: string
                    description: 'Email address to which the message will be sent'
                    example: client@example.com
                name:
                    type: string
                    description: 'Recipient''s name. Will be used in the email text'
                    example: 'Иван Димитров'
                subject:
                    type: string
                    description: "Subject of the sent email. Defaults to the number of the sent invoice.\n"
                    example: 'Фактура за месец Май'
                message:
                    type: string
                    description: "Text of the email.\nMust contain the string `[download_link]`, which will be replaced with the actual download link.\nIf this text is provided, the template parameter will be ignored.\n"
                template:
                    type: integer
                    format: int64
                    description: 'Unique ID of the email template.'
                    example: 95
        File:
            type: object
            properties:
                id:
                    type: integer
                    example: 9876
                    description: 'Unique file ID'
                filename:
                    type: string
                    example: invoice-jan-2025.pdf
                    description: 'Name of the file'
                client_id:
                    type: integer
                    example: 1001
                    description: 'Unique client ID to which the file is attached'
                directory_id:
                    type: integer
                    example: 42
                    description: 'Unique ID of the directory where the file is stored'
                file_type:
                    type: string
                    enum:
                        - invoice
                        - report
                        - debit
                        - credit
                        - proforma
                        - doc
                        - certificate
                        - offer
                        - other
                    example: invoice
                    description: 'File type (invoice, protocol, other)'
                notes:
                    type: string
                    example: 'Quarterly financial report'
                    description: 'Notes for the file'
                created_at:
                    allOf:
                        -
                            $ref: '#/components/schemas/DateTime'
                send_status:
                    type: string
                    enum:
                        - unsent
                        - resent
                        - sent
                    example: sent
                    description: 'File send status'
                confirmation:
                    type: string
                    enum:
                        - accepted
                        - rejected
                        - sent
                        - not-sent
                    example: accepted
                    description: 'Confirmation status of the file'
                created_by:
                    type: integer
                    example: 1
                    description: 'Unique ID of the user who uploaded the file'
        DirectoryFlat:
            type: object
            properties:
                id:
                    type: integer
                    example: 1
                parent_id:
                    type: integer
                    nullable: true
                    description: 'Parent directory ID (null if it is in the root)'
                    example: null
                name:
                    type: string
                    description: 'Directory name'
                    example: Invoices
                files:
                    type: array
                    description: 'List of files in this directory'
                    items:
                        $ref: '#/components/schemas/FileBasic'
        FileBasic:
            type: object
            properties:
                id:
                    type: integer
                    description: 'Unique file number'
                    example: 101
                filename:
                    type: string
                    description: 'Name of the file'
                    example: invoice_1234.pdf
        SecondaryCurrencySettings:
            type: object
            properties:
                secondary_currency_per_row:
                    type: boolean
                    description: "If true, displays a secondary currency (EUR) for each row in documents denominated in BGN.\n"
                    example: true
                    default: false
                secondary_currency_totals:
                    type: boolean
                    description: "If true, displays a secondary currency (EUR) for total amounts in documents denominated in BGN.\n"
                    example: true
                    default: false
        InvoiceModuleSettings:
