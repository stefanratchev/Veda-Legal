                            enum:
                                - deb
                                - cred
                                - prof
                                - dan
                                - ...
                            example: dan
                        to_name:
                            type: string
                            description: "Name of the document recipient.\n\n**Processing logic:**\n1. If both Bulstat and VAT number are empty:\n   - The system searches for a client by **client name** and **empty Bulstat**.\n2. If such a client is found:\n   - The client will be **updated** with the data from the request.\n3. If no such client is found:\n   - A **new client** will be created with this data.\n"
                            example: 'Възраждане АД'
                        to_country:
                            description: 'Country of recipient of this document - Abbreviation in ISO-3166-1 alpha-2 https://en.wikipedia.org/wiki/ISO_3166-1_alpha-2'
                            type: string
                            example: BG
                        to_town:
                            description: 'The town where the recipient is registered'
                            type: string
                            example: София
                        to_address:
                            description: 'Address of the recipient of the document'
                            type: string
                            example: 'ул. Климент Охридски № 125'
                        to_bulstat:
                            type: string
                            description: "Bulstat (UIC) of the document recipient.\n\n**Required:**\n- This field is mandatory if:\n  - `is_to_person` is `false`, **and**\n  - The \"Require UIC/EGN\" setting in the company profile is enabled.\n\n**Processing logic:**\n1. If a Bulstat is provided:\n   - If a client with this Bulstat already exists in the system, it will be **updated** with the data from the request.\n   - If no such client is found, a **new client** will be created with this data.\n"
                            example: '1234567890'
                        to_is_reg_vat:
                            description: 'Sets whether the recipient is registered under VAT law. It is mandatory if `is_to_person'' is `false'' and the setting for mandatory Company Number/EGN in the company profile is active.'
                            type: boolean
                            example: true
                        to_vat_number:
                            type: string
                            description: "VAT number of the document recipient.\n\n**Required:**\n- This field is mandatory if `to_is_reg_vat` is `true`.\n\n**Processing logic:**\n1. If a VAT number is provided, but no Bulstat is given:\n   - If a client with this VAT number already exists in the system, it will be **updated** with the data from the request.\n   - If no such client is found, a **new client** will be created with this data.\n"
                            example: BG1234567890
                        to_mol:
                            description: 'Responsible person of the recipient. Required if `is_to_person` is `false`'
                            type: string
                            example: 'Петър Страшимиров'
                        is_to_person:
                            description: 'Indicates whether the recipient of the document is an individual (if `true`) or a company (if `false`)'
                            type: boolean
                            example: false
                            default: false
                        to_egn:
                            description: 'EGN of the recipient. Required if `is_to_person` is `true`'
                            type: string
                            example: 8210129421
                        recipient:
                            description: 'Name of recipient of this document'
                            type: string
                            example: 'Иван Георгиев'
                        delivery_address:
                            description: 'Delivery address of the document'
                            type: string
                            example: 'ул. Климент Охридски № 125'
                        creator:
                            description: 'Name of the creator of this document. If not provided, the API will default to using the name associated with the user making the request.'
                            type: string
                            example: 'Георги Иванов'
                        creator_en:
                            description: 'Name of the creator of this document in english. If not provided, the API will default to using the name associated with the user making the request.'
                            type: string
                            example: 'Georgi Ivanov'
                        payment_currency:
                            allOf:
                                -
                                    $ref: '#/components/schemas/Currency'
                                -
                                    description: 'Currency for all prices of this document'
                        currency_rate:
                            description: 'For documents in currencies other than BGN, provide the exchange rate (BGN/XXX).'
                            type: number
                            format: double
                            default: 1.0
                            example: 1
                        date_rate:
                            allOf:
                                -
                                    $ref: '#/components/schemas/DateTime'
                                -
                                    description: 'The date to which the course applies.'
                        payment_method:
                            description: 'The method of payment of the document is set: cash - In cash, bank - Bank route, ondlv - Cash on delivery, card - With a card, order - Payment order, check - Check/Voucher, barter - By direct debit, moneytransfer - Money transfer, epay - E-Pay, paypal - PayPal, stripe - Stripe, revolut - Revolut, easypay - EasyPay, other - Other'
                            type: string
                            enum:
                                - cash
                                - bank
                                - ondlv
                                - card
                                - order
                                - cheque
                                - barter
                                - moneytransfer
                                - epay
                                - paypal
                                - stripe
                                - revolut
                                - easypay
                                - other
                            example: bank
                        payment_options:
                            description: 'Indicates the options for paying the invoice electronically. To take advantage of the setting, at least one payment method must be enabled in your company.'
                            type: array
                            items:
                                type: string
                                enum:
                                    - paypal
                                    - epay
                                    - easypay
                                    - bpay
                                    - stripe
                                    - revolut
                        reduction:
                            description: 'Settings for the discount to this document'
                            type: object
                            properties:
                                type:
                                    description: 'Discount type. Percentage of the tax base (`percent`) or absolute value of the tax base (`currency`)'
                                    type: string
                                    enum:
                                        - percent
                                        - currency
                                    example: percent
                                value:
                                    type: number
                                    format: double
                                    example: 5
