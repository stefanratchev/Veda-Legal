openapi: 3.0.0
info:
    description: "[<img src=\"/images/bg.svg\" alt=\"Bulgarian Language\" style=\"width: 15px; border: 1px solid #8080806e; vertical-align: middle\"/> Вижте на Български](/docs/bg) [<img src=\"/images/gb.svg\" alt=\"English Language\" style=\"width: 15px; border: 1px solid #8080806e; vertical-align: middle; margin-left: 20px\"/> Read in English](/docs/en)\n\nThis [API](https://en.wikipedia.org/wiki/Application_programming_interface) can be used for machine access to the data of companies registered in Inv.Bg. Also, it allows editing of this data.\n\n**Authorization:** To use this API you need to get an API token. You can get one on your account. One-day tokens can also be generated by requesting [POST /v3/login/token](#operation/getLoginToken) on this API. This will require a company domain, username and password. You can register your company for free here . Long-term tokens can be generated in the company profile - in \"Settings\" -> \"About the Company\" -> \"API access\". Then, when requesting the API, this token must be added to the Authorization HTTP header. Example: Authorization: Bearer <token>. This is the Bearer Authorization Scheme. For more information - [RFC-6750](https://tools.ietf.org/html/rfc6750).\n\n**Language selection:** Some resources returned by this API may be in more than one language. These are [invoices](#operation/getInvoices) , [items](#operation/getItems) and [customers](#operation/getClients) . This functionality works on the condition that the fields in the respective languages ​​have been entered for the relevant resources. For this purpose, the HTTP header [Accept-Language](https://www.w3.org/Protocols/rfc2616/rfc2616-sec14.html#sec14.4) is added to the request to the API with the value the name of the desired language in ISO 639-1 format (example: bg, en). Example of using this header: `Accept-Language: en`. By default, the data is in Bulgarian. Supported languages: Bulgarian (`bg`), English (`en`).\n\n**Interactive Specification:** [An interactive specification via Swagger UI](/v3/swagger-ui/) via Swagger UI can be found [here](/v3/swagger-ui/). Through it, real requests can be made to the API. This requires a company API token. This token must be added in the field that appears after pressing the \"Authorize\" button. The field must be written `Bearer <token>`. Steps to use the interactive Swagger UI:\n1. Open [the interactive Swagger UI](/v3/swagger-ui/)\n2. Log in to your account, go to settings > API access and add a new token\n3. Click Authorize (on the right side of the screen) in the Swagger UI\n4. Enter the following string in input: \"Bearer \" + \"the token you generated\"\n5. Press Authorize (under input-a)\n\n**Customer Portal:** This is a collection of methods for extracting information about received invoices from the point of view of their recipient and are connected to it through a specially generated token, which is different from the token for accessing the rest of the API methods. To be able to use the methods of the client portal, you can get an access token only by contacting us by writing to [support@inv.bg](mailto:support@inv.bg)."
