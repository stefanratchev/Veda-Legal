                    type: object
                -
                    properties:
                        custom_properties:
                            type: array
                            description: "Additional customer data.\nAn array of key/value pairs describing additional data about the customer.\n\n- If `custom_properties` is omitted as a parameter, the current data remains unchanged.\n- If `custom_properties` is provided as a parameter and its value is an empty array (i.e., [] or null), \nthen all additional data for the customer will be deleted.\n- If `custom_properties` is an array of objects:\n        - All existing data will be deleted and the supplied additional data will be added in their place.\n\nThis algorithm allows you to submit the desired state of the objects in `custom_properties` and \nachieve this final state simply by passing everything needed in `custom_properties`, \nwithout having to explicitly delete entries.\n"
                            items:
                                type: object
                                properties:
                                    key:
                                        type: string
                                        description: 'Custom data key'
                                    value:
                                        type: string
                                        description: 'Custom data value'
                                    use_in_invoices:
                                        type: boolean
                                        description: 'Whether to use this custom data in invoices. Defaults to `false`.'
                                required:
